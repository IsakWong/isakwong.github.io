<header class="site-header">
  <div class="container">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/projects/' | relative_url }}">作品</a>
      <a href="{{ '/blog/' | relative_url }}">技术文章</a>

      {% if site.author.github %}

      {% endif %}
    </nav>
  </div>
</header>
