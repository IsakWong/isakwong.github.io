---
layout: default
---
<article class="project-detail">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    <p class="project-desc">{{ page.description }}</p>
    <div class="project-meta">
      {% if page.tags %}
        <div class="project-tags">
          {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        </div>
      {% endif %}
      {% if page.repo %}
        <a href="{{ page.repo }}" class="btn" target="_blank" rel="noopener">GitHub Repo →</a>
      {% endif %}
      {% if page.demo %}
        <a href="{{ page.demo }}" class="btn btn-outline" target="_blank" rel="noopener">Live Demo →</a>
      {% endif %}
    </div>
  </header>
  {% if page.cover %}
  <div class="project-hero-img">
    <img src="{{ page.cover | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
